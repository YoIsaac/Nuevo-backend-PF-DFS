<!DOCTYPE html>
<html lang="es">
<head>

  <title>Task Manager - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Task Manager</h1>

  <p id="mensaje"></p>

  <script src="script.js"></script>
</body>
</html>
